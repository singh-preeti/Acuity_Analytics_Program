<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css" />
</head>
<body class="bg-light py-5">

  <div class="container" style="max-width: 700px;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4 text-center">Registration Form</h4>

        <form class="row g-3 needs-validation" novalidate>

          <!-- First & Last Name -->
          <div class="col-md-6">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="Enter first name" required />
            <div class="valid-feedback">Looks good!</div>
            <div class="invalid-feedback">Please enter your first name.</div>
          </div>

          <div class="col-md-6">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Enter last name" required />
            <div class="valid-feedback">Looks good!</div>
            <div class="invalid-feedback">Please enter your last name.</div>
          </div>

          <!-- Username -->
          <div class="col-md-6">
            <label for="username" class="form-label">Username</label>
            <div class="input-group has-validation">
              <span class="input-group-text">@</span>
              <input type="text" class="form-control" id="username" placeholder="username" required />
              <div class="invalid-feedback">Please choose a username.</div>
            </div>
          </div>

          <!-- Email -->
          <div class="col-md-6">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
            <div class="valid-feedback">Looks good!</div>
            <div class="invalid-feedback">Please enter a valid email address.</div>
          </div>

          <!-- City -->
          <div class="col-md-6">
            <label for="city" class="form-label">City</label>
            <select class="form-select" id="city" required>
              <option value="">-- Select City --</option>
              <option>Mumbai</option>
              <option>Delhi</option>
              <option>Bengaluru</option>
              <option>Hyderabad</option>
              <option>Chennai</option>
              <option>Kolkata</option>
              <option>Pune</option>
              <option>Ahmedabad</option>
              <option>Jaipur</option>
              <option>Surat</option>
              <option>Lucknow</option>
              <option>Chandigarh</option>
            </select>
            <div class="invalid-feedback">Please select a city.</div>
          </div>

          <!-- State -->
          <div class="col-md-6">
            <label for="state" class="form-label">State</label>
            <select class="form-select" id="state" required>
              <option value="">-- Select State --</option>
              <option>Maharashtra</option>
              <option>Delhi</option>
              <option>Karnataka</option>
              <option>Telangana</option>
              <option>Tamil Nadu</option>
              <option>West Bengal</option>
              <option>Gujarat</option>
              <option>Rajasthan</option>
              <option>Uttar Pradesh</option>
              <option>Punjab</option>
            </select>
            <div class="invalid-feedback">Please select a state.</div>
          </div>

          <!-- Zip -->
          <div class="col-md-4">
            <label for="zip" class="form-label">Zip / PIN Code</label>
            <input type="text" class="form-control" id="zip" placeholder="6-digit PIN" maxlength="6" required />
            <div class="invalid-feedback">Please provide a valid 6-digit PIN code.</div>
          </div>

          <!-- Terms -->
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="terms" required />
              <label class="form-check-label" for="terms">I agree to the Terms &amp; Conditions</label>
              <div class="invalid-feedback">You must agree before submitting.</div>
            </div>
          </div>

          <!-- Submit -->
          <div class="col-12">
            <button class="btn btn-primary w-100" type="submit">Submit Form</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
  <script>
    // Bootstrap 5 validation
    (() => {
      'use strict';
      const forms = document.querySelectorAll('.needs-validation');
      forms.forEach(form => {
        form.addEventListener('submit', e => {
          // Extra: validate ZIP is 6 digits
          const zip = document.getElementById('zip');
          if (!/^\d{6}$/.test(zip.value)) {
            zip.setCustomValidity('Invalid PIN');
          } else {
            zip.setCustomValidity('');
          }

          if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
          }
          form.classList.add('was-validated');
        });
      });
    })();
  </script>

</body>
</html>
