spring.application.name=EmployeeManagement
# JDBC URL for in-memory H2 database
spring.datasource.url=jdbc:h2:mem:Preeti

# H2 driver
spring.datasource.driverClassName=org.h2.Driver

# Default username and password
spring.datasource.username=sa
spring.datasource.password=

# Hibernate dialect for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically create/update tables
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console in browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
